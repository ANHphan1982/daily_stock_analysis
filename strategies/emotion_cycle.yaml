# Sentiment Cycle Strategy / 情绪周期
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.

name: emotion_cycle
display_name: Chu kỳ cảm xúc
description: Dựa trên tâm lý thị trường, tỷ lệ luân chuyển và cấu trúc khối lượng-giá, nhận diện đáy cảm xúc（đáy hoảng loạn）và đỉnh cảm xúc（đỉnh hưng phấn）, bố cục ngược cảm xúc.
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news
aliases: [tâm lý, chu kỳ cảm xúc]
default_priority: 100
market_regimes: [sector_hot]

instructions: |
  **Chu kỳ cảm xúc（Sentiment Cycle Strategy）**

  Triết lý cốt lõi: cảm xúc của người tham gia thị trường tuần hoàn trong "hoảng loạn→bi quan→nghi ngờ→hy vọng→lạc quan→hào hứng→tham lam→hưng phấn".
  Dòng tiền lớn bố cục ở đáy hoảng loạn, thoát ra ở đỉnh hưng phấn.

  ## Chỉ số lượng hóa giai đoạn cảm xúc

  ### Bước 1: Phân tích tỷ lệ luân chuyển（chỉ số cốt lõi của nhiệt độ cảm xúc）
  Sử dụng `get_daily_history` và `get_realtime_quote`:

  - **Tỷ lệ luân chuyển < 0.5%/ngày**: thị trường lạnh, không ai quan tâm, vùng đáy tiềm năng（tham lam khi người khác sợ hãi）.
  - **Tỷ lệ luân chuyển 0.5%~2%**: giao dịch bình thường, cảm xúc ổn định.
  - **Tỷ lệ luân chuyển 2%~5%**: sôi động, thị trường bắt đầu chú ý, không nên đuổi theo đà tăng.
  - **Tỷ lệ luân chuyển > 5%**: nhiệt độ cao, dòng tiền nhanh/nhà đầu tư nhỏ lẻ ồ ạt vào, cảnh giác đỉnh cảm xúc.
  - **Tỷ lệ luân chuyển > 10%（bình quân ngày）**: quá nóng, thường là đỉnh ngắn hạn.

  ### Bước 2: Diễn biến tỷ lệ luân chuyển liên tiếp
  Sử dụng `get_daily_history` tính xu hướng tỷ lệ luân chuyển 20 ngày gần nhất:
  - Từ cao xuống thấp（liên tục hạ nhiệt）+ khối lượng thu hẹp → cảm xúc rút lui, kiên nhẫn chờ.
  - Từ thấp lên cao（tăng tốc nóng lên）+ khối lượng tăng đột biến → cảm xúc khởi động, có thể tham gia.
  - Đột ngột một ngày tăng khối lượng lớn（tỷ lệ luân chuyển vượt 5 lần trước đó）→ thường là tổ chức thoát hàng, cần cảnh giác.

  ### Bước 3: Phân tích mặt cảm xúc tin tức
  Sử dụng `search_stock_news` tìm tin tức gần đây, phân tích xu hướng cảm xúc:
  - Tin tức tập trung xuất hiện "lợi tốt được hiện thực hóa, kết quả kinh doanh vượt kỳ vọng, kịch trần, tổ chức khuyến nghị" → cảm xúc có thể quá nóng.
  - Tin tức tập trung xuất hiện "kết quả kinh doanh giảm, tin xấu, giảm dưới hỗ trợ" → cảm xúc bi quan có thể tạo đáy.
  - Cảm xúc diễn đàn nhà đầu tư nhỏ lẻ/mạng xã hội cực kỳ tiêu cực → chỉ báo ngược, có thể gần đáy.

  ### Bước 4: Thu hẹp đường MA và biến động
  Sử dụng `analyze_trend`:
  - MA5/MA10/MA20 ba đường co lại（đường MA thu hẹp）→ tích lũy, hướng chờ xác định, cảm xúc lạnh.
  - Biến động giảm xuống mức thấp（ATR thu hẹp）→ cảm xúc cực kỳ thấp, dấu hiệu trước khi bùng phát tích lũy.

  ## Đặc điểm đáy cảm xúc（vùng mua）
  Thỏa mãn 3 tiêu chí trở lên:
  ✅ Tỷ lệ luân chuyển 20 ngày gần đây ở mức thấp nhất trong một năm
  ✅ Khối lượng giao dịch liên tục thu hẹp, thấp hơn 50% khối lượng trung bình 60 ngày gần đây
  ✅ Tin tức gần đây chủ yếu trung tính hoặc tiêu cực
  ✅ Giá ở gần hoặc dưới MA20, nhưng chưa có đà giảm hoảng loạn
  ✅ Tổ chức nắm giữ ổn định hoặc tăng nhẹ（nếu có dữ liệu）

  ## Đặc điểm đỉnh cảm xúc（vùng giảm vị thế）
  Thỏa mãn 3 tiêu chí trở lên:
  ⚠️ Tỷ lệ luân chuyển 5 ngày gần đây > 2 lần giá trị trung bình 20 ngày
  ⚠️ Khối lượng giao dịch tăng đột biến（trong một ngày）
  ⚠️ Tin tức chủ yếu là lợi tốt được hiện thực hóa, tổ chức nâng mục tiêu giá mạnh, nhà đầu tư nhỏ lẻ đổ xô mua
  ⚠️ Giá lệch khỏi MA5 hơn 8%（độ lệch cao）
  ⚠️ MACD xuất hiện phân kỳ đỉnh

  ## Yêu cầu đầu ra
  - Đánh giá giai đoạn cảm xúc hiện tại: đáy lạnh / ổn định / khởi động tham gia / quá nóng cảnh giác / đỉnh hưng phấn.
  - So sánh tỷ lệ luân chuyển hiện tại với giá trị trung bình một năm.
  - Có thỏa mãn đặc điểm đáy hoặc đỉnh cảm xúc（liệt kê các tiêu chí thỏa mãn）.
  - Đưa ra khuyến nghị giao dịch ngược cảm xúc（đám đông sợ hãi tôi tham lam, đám đông tham lam tôi thận trọng）.

  Khuyến nghị điều chỉnh điểm:
  - Đặc điểm đáy cảm xúc thỏa mãn 3 tiêu chí trở lên: `sentiment_score +14`
  - Đặc điểm đáy cảm xúc thỏa mãn toàn bộ 5 tiêu chí: `sentiment_score +20`
  - Đặc điểm đỉnh cảm xúc thỏa mãn 3 tiêu chí trở lên: `sentiment_score -12`
  - Đặc điểm đỉnh cảm xúc thỏa mãn toàn bộ 5 tiêu chí: `sentiment_score -20`
  - Vùng cảm xúc ổn định: không điều chỉnh điểm cơ sở
