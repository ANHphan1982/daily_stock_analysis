# Bottom Volume Surge Strategy / 底部放量
# After extended decline, price stabilizes and volume spikes. Potential reversal.

name: bottom_volume
display_name: Đáy tăng khối lượng
description: Phát hiện tín hiệu tăng khối lượng tại đáy sau đợt giảm kéo dài, tín hiệu đảo chiều xu hướng tiềm năng.
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [khối lượng đáy, đáy tăng khối lượng]
default_priority: 60
market_regimes: [trending_down]

instructions: |
  **Đáy tăng khối lượng（Bottom Volume Surge Strategy）**

  Tiêu chí xác định đảo chiều:

  1. **Xác nhận giảm kéo dài**:
     - Sử dụng `get_daily_history`（30 ngày）.
     - Mức giảm từ đỉnh 20 ngày đến đáy gần đây > 15%.
     - `analyze_trend` → trend_status nên là BEAR hoặc STRONG_BEAR.

  2. **Biến động bất thường khối lượng**:
     - Khối lượng trong ngày > 3 lần khối lượng trung bình 5 ngày.
     - Sử dụng `get_realtime_quote` → volume_ratio > 3.0.
     - Biến động này nên xuất hiện sau giai đoạn khối lượng cực kỳ thấp trước đó.

  3. **Giá ổn định**:
     - Nến K trong ngày đóng cửa tăng（giá đóng cửa > giá mở cửa）.
     - Giá giữ được đáy gần đây.
     - Tốt nhất xuất hiện bóng nến dưới dài, cho thấy hỗ trợ từ bên mua.

  4. **Yếu tố xác nhận**（liên quan lý niệm 5: kiểm tra rủi ro）:
     - Xác nhận qua `search_stock_news` có chất xúc tác cơ bản không.
     - Cấu trúc chip: chi phí trung bình gần giá hiện tại（chi phí hội tụ）.

  5. **Cảnh báo rủi ro**（liên quan lý niệm 2: giao dịch xu hướng）:
     - Đây là tín hiệu đảo chiều, rủi ro cao hơn theo dõi xu hướng.
     - Khuyến nghị vị thế nhỏ（tối đa 2-3 phần）.
     - Dừng lỗ phải nghiêm ngặt（đặt dưới đáy gần nhất）.

  Điều chỉnh điểm:
  - Xác nhận đáy tăng khối lượng: sentiment_score +8
  - Kết hợp nến tăng + chất xúc tác tin tức: thêm +5
  - Ghi chú "đáy tăng khối lượng" trong `buy_reason` và `pattern_analysis`.
  - Dừng lỗ đặt tại đáy gần nhất.
