# Volume Breakout Strategy / 放量突破
# Price breaks above resistance on heavy volume (>2x average).

name: volume_breakout
display_name: Phá vỡ tăng khối lượng
description: Phát hiện tín hiệu phá vỡ tăng khối lượng tại kháng cự. Áp dụng khi giá tiếp cận kháng cự đã biết.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [phá vỡ tăng khối lượng, phá vỡ]
default_priority: 30
market_regimes: [trending_up]

instructions: |
  **Phá vỡ tăng khối lượng（Volume Breakout Strategy）**

  Tiêu chí xác định phá vỡ:

  1. **Nhận diện kháng cự**:
     - Sử dụng `analyze_trend` → resistance_levels để lấy các mức kháng cự.
     - Thường là đỉnh 20 ngày hoặc đỉnh vùng dao động trước đó.

  2. **Xác nhận khối lượng**（liên quan lý niệm 3: ưu tiên hiệu quả）:
     - Khối lượng trong ngày > 2 lần khối lượng trung bình 5 ngày.
     - Sử dụng `get_realtime_quote` → volume_ratio > 2.0 để xác nhận.
     - Sử dụng `get_daily_history` tính khối lượng trung bình để kiểm tra chéo.

  3. **Xác nhận giá**（liên quan lý niệm 1: chiến lược vào lệnh chặt chẽ）:
     - Giá đóng cửa phải vượt trên mức kháng cự.
     - Đóng cửa nên nằm trong 30% trên biên độ ngày（đóng cửa mạnh）.
     - Kiểm tra độ lệch sau phá vỡ: vẫn cần < 5%, tránh đuổi theo đà tăng.

  4. **Xác nhận theo dõi**（nếu có dữ liệu）:
     - Ngày hôm sau mở cửa nên trên mức phá vỡ, phân biệt phá vỡ thật và giả.

  5. **Lọc rủi ro**（liên quan lý niệm 5: kiểm tra rủi ro）:
     - Kiểm tra qua `search_stock_news` không có tin xấu trọng yếu.
     - PE không nên quá cao（tránh phá vỡ kiểu bong bóng）.

  Điều chỉnh điểm:
  - Xác nhận phá vỡ tăng khối lượng: sentiment_score +12
  - Phá vỡ kèm cộng hưởng ngành（ngành cũng tăng mạnh）: thêm +5
  - Điểm mua lý tưởng gần mức phá vỡ, dừng lỗ dưới mức phá vỡ 3%.
  - Ghi chú "phá vỡ tăng khối lượng" trong `buy_reason` và `volume_analysis`.
