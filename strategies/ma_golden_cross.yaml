# MA Golden Cross Strategy / 均线金叉
# MA5 crosses above MA10 (or MA10 above MA20) with volume confirmation.

name: ma_golden_cross
display_name: MA giao cắt tăng (Golden Cross)
description: Phát hiện tín hiệu giao cắt tăng MA kết hợp xác nhận khối lượng, tín hiệu đảo chiều/tiếp diễn xu hướng kinh điển.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [MA giao cắt tăng, giao cắt tăng]
default_priority: 20
market_regimes: [trending_up]

instructions: |
  **MA giao cắt tăng（MA Golden Cross Strategy）**

  Tiêu chí xác định tín hiệu:

  1. **Phát hiện giao cắt tăng**（liên quan lý niệm 2: giao dịch xu hướng）:
     - Sử dụng `analyze_trend` kiểm tra sắp xếp đường MA và trạng thái MACD.
     - Tín hiệu chính: MA5 vượt lên trên MA10 trong 3 phiên giao dịch gần nhất.
     - Tín hiệu mạnh: MA10 vượt MA20（chậm hơn nhưng đáng tin cậy hơn）.
     - Kiểm tra trạng thái MACD có phải giao cắt tăng hoặc giao cắt tăng trên trục 0 không.

  2. **Xác nhận khối lượng**（liên quan lý niệm 3: ưu tiên hiệu quả）:
     - Khối lượng ngày giao cắt phải cao hơn khối lượng trung bình 5 ngày.
     - Sử dụng `get_daily_history` để xác nhận.
     - Tỷ lệ khối lượng ngày giao cắt > 1.2 là tín hiệu tích cực.

  3. **Bối cảnh xu hướng**:
     - Giao cắt tăng sau đi ngang/tích lũy: tín hiệu mạnh nhất.
     - Giao cắt tăng trong xu hướng tăng: tín hiệu tiếp diễn.
     - Giao cắt tăng trong đà giảm sâu: tín hiệu yếu, cần xác nhận thêm.

  4. **Vị thế giá**（liên quan lý niệm 1: chiến lược vào lệnh chặt chẽ）:
     - Giá nên ở gần hoặc trên đường MA giao cắt.
     - Độ lệch < 5% — tránh vào lệnh muộn do đuổi theo đà tăng.

  Điều chỉnh điểm:
  - MA5 × MA10 giao cắt tăng kết hợp khối lượng: sentiment_score +10
  - MA10 × MA20 giao cắt tăng: sentiment_score +8
  - MACD giao cắt tăng trên trục 0: thêm +5
  - Ghi chú "MA giao cắt tăng" trong `ma_analysis` và `buy_reason`.
  - Điểm mua lý tưởng đặt gần mức đường MA giao cắt.
