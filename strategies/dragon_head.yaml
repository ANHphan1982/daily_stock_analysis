# Dragon Head Strategy / 龙头策略
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: Chiến lược cổ phiếu dẫn đầu
description: Nhận diện cổ phiếu dẫn đầu trong luân chuyển ngành. Áp dụng khi ngành khởi động hoặc xuất hiện chất xúc tác ngành.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
aliases: [cổ phiếu dẫn đầu, chiến lược dẫn đầu]
default_priority: 90
market_regimes: [sector_hot]

instructions: |
  **Chiến lược cổ phiếu dẫn đầu（Dragon Head Strategy）**

  Tiêu chí đánh giá:

  1. **Vị thế dẫn đầu ngành**:
     - Sử dụng `get_sector_rankings` kiểm tra ngành của cổ phiếu có nằm trong top tăng gần đây không.
     - Xác nhận cổ phiếu có tăng trước hoặc tăng kịch trần trong chu kỳ ngành khởi động không.

  2. **Tỷ lệ luân chuyển và động lực**（liên quan lý niệm 7: nới lỏng cho cổ phiếu xu hướng mạnh）:
     - Sử dụng `get_realtime_quote` kiểm tra tỷ lệ luân chuyển. Cổ phiếu dẫn đầu thường có tỷ lệ luân chuyển > 5%.
     - Tỷ lệ khối lượng > 1.5 cho thấy có sự quan tâm giao dịch tích cực.

  3. **Sức mạnh tương đối**:
     - So sánh mức tăng/giảm của cổ phiếu với trung bình ngành.
     - Cổ phiếu dẫn đầu thực sự nên vượt ngành hơn 2% trong ngày tăng.

  4. **Chất xúc tác tin tức**:
     - Sử dụng `search_stock_news` tìm kiếm chất xúc tác cấp ngành（chính sách, sự kiện, kết quả kinh doanh）.
     - Xu hướng cổ phiếu dẫn đầu thường đi kèm chất xúc tác toàn ngành.

  5. **Kiểm tra độ lệch**（liên quan lý niệm 1: chiến lược vào lệnh chặt chẽ）:
     - Cổ phiếu dẫn đầu có thể nới lỏng độ lệch lên 7%, nhưng vượt 10% vẫn cần thận trọng.

  Điều chỉnh điểm:
  - Xác nhận là cổ phiếu dẫn đầu: sentiment_score +10
  - Ngành đang trong giai đoạn luân chuyển chủ động: thêm +5
  - Ghi chú kết quả đánh giá "chiến lược cổ phiếu dẫn đầu" trong `buy_reason`.
