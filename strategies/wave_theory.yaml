instructions: |
  **Lý thuyết sóng（Elliott Wave Theory）**

  Nguyên tắc cốt lõi: thị trường vận động theo cấu trúc chu kỳ 5 sóng đẩy + 3 sóng điều chỉnh.

  ## Các bước phân tích

  ### 1. Nhận diện loại sóng hiện tại
  Sử dụng `get_daily_history` lấy dữ liệu 120 ngày gần nhất, kết hợp dữ liệu xu hướng từ `analyze_trend`:

  **Đặc điểm nhận diện sóng đẩy（1-3-5）**:
  - Sóng 1: sóng đầu tiên của đảo chiều xu hướng, khối lượng giao dịch tăng vừa phải.
  - Sóng 3: sóng đẩy mạnh nhất, thường tăng khối lượng, MACD mạnh; tuyệt đối không phải sóng ngắn nhất.
  - Sóng 5: khối lượng thường yếu hơn sóng 3, xuất hiện phân kỳ đỉnh thì sắp kết thúc sau khi tăng cao.

  **Đặc điểm nhận diện sóng điều chỉnh（A-B-C）**:
  - Sóng A: đợt giảm đầu tiên, khối lượng giao dịch lớn, hầu hết coi là hồi về.
  - Sóng B: phục hồi, động lực yếu hơn đà tăng trước, khối lượng thu hẹp, rủi ro bẫy cao.
  - Sóng C: đợt giảm thứ hai, động lực thường vượt sóng A, hoàn thành điều chỉnh.

  ### 2. Xác định vị trí vàng
  - Điều chỉnh sóng 2 thường ở mức 38.2%~61.8% của sóng 1.
  - Mục tiêu sóng 3 thường là mở rộng 1.618~2.618 lần sóng 1.
  - Sóng 4 không được xâm phạm vùng giá sóng 1（vi phạm quy tắc sóng）.
  - Mục tiêu sóng C: tính từ đỉnh sóng A, bằng hoặc vượt độ dài sóng A.

  ### 3. Điểm mua tối ưu
  - **Sóng 2 điều chỉnh ổn định**（hố vàng）: điểm mua an toàn nhất, dừng lỗ tại điểm xuất phát sóng 1.
  - **Sóng 4 điều chỉnh ổn định**: thứ cấp, dừng lỗ tại đỉnh sóng 1.
  - **Phá vỡ giai đoạn đầu sóng 3**: khi tăng khối lượng vượt đỉnh sóng 1.
  - Tránh đuổi theo đà tăng ở cuối sóng 5（rủi ro phân kỳ đỉnh）.

  ### 4. Cảnh báo rủi ro
  - Sóng B phục hồi không nên giữ vị thế lớn（tính chất bẫy）.
  - Đếm sóng mang tính chủ quan, cần kết hợp với các chỉ báo kỹ thuật khác để xác nhận.
  - Nếu quy tắc sóng bị vi phạm（như sóng 4 xâm phạm sóng 1）, cần đếm lại.

  ### 5. Yêu cầu đầu ra
  - Nêu vị trí sóng hiện tại có thể（ví dụ: "đang ở giữa sóng 3" hoặc "nghi ngờ điều chỉnh sóng 4"）.
  - Cung cấp các mức hỗ trợ/kháng cự Fibonacci quan trọng（0.382/0.618/1.618）.
  - Giải thích hiện tại là thời điểm mua, chờ cơ hội hay tránh né.
  - Ghi chú mức độ tin cậy của đếm sóng（cao/trung bình/thấp）.

  Khuyến nghị điều chỉnh điểm:
  - Đáy sóng 2 ổn định（hố vàng）: `sentiment_score +15`
  - Xác nhận phá vỡ sóng 3: `sentiment_score +12`
  - Cuối sóng 5/phân kỳ đỉnh: `sentiment_score -10`
  - Đang trong đà giảm sóng C: `sentiment_score -12`
