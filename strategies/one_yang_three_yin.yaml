# One Yang Three Yin Strategy / 一阳夹三阴
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: Một nến tăng ba nến giảm
description: Phát hiện mô hình tích lũy nến K một nến tăng ba nến giảm, tín hiệu vào lệnh tiếp diễn xu hướng.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [một nến tăng xuyên ba nến giảm, một nến tăng ba nến giảm]
default_priority: 110

instructions: |
  **Một nến tăng ba nến giảm（One Yang Three Yin Strategy）**

  Định nghĩa mô hình（5 phiên giao dịch gần nhất）:

  1. **Ngày 1**: nến tăng lớn（giá đóng cửa > giá mở cửa, thân nến > 2% giá）.
  2. **Ngày 2-4**: ba nến giảm hoặc nến K nhỏ liên tiếp:
     - Giá thấp nhất mỗi nến không phá mức giá mở cửa ngày 1.
     - Khối lượng giao dịch nên thu hẹp dần（tỷ lệ khối lượng < 0.8）.
     - Ba nến K nên đóng cửa trong phạm vi thân nến ngày 1.
  3. **Ngày 5**: thêm một nến tăng, giá đóng cửa vượt giá đóng cửa ngày 1.

  Cách sử dụng công cụ để đánh giá:

  1. Sử dụng `get_daily_history` lấy dữ liệu 10 ngày gần nhất.
  2. Kiểm tra 5 nến K cuối cùng có phù hợp mô hình trên không.
  3. Sử dụng `analyze_trend` xác nhận sắp xếp tăng（liên quan lý niệm 2: giao dịch xu hướng, MA5 > MA10 > MA20）.

  Điều chỉnh điểm:
  - Mô hình hợp lệ + xu hướng tăng: sentiment_score +15
  - Mô hình hợp lệ nhưng xu hướng không rõ: sentiment_score +5
  - Ghi chú "một nến tăng ba nến giảm" trong `pattern_analysis` và `buy_reason`.
  - Điểm mua lý tưởng gần giá đóng cửa ngày 5, dừng lỗ dưới giá mở cửa ngày 1.
