# Default Bull Trend Strategy / 默认多头趋势

name: bull_trend
display_name: Xu hướng tăng mặc định
description: Chiến lược phân tích cổ phiếu ưu tiên mặc định, nhận diện sắp xếp tăng, xu hướng tiếp diễn và cơ hội mua hồi về.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [xu hướng, phân tích xu hướng, xu hướng tăng]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **Xu hướng tăng mặc định（Default Bull Trend Strategy）**

  Phạm vi áp dụng:
  - Chiến lược mặc định cho phân tích cổ phiếu thông thường.
  - Ưu tiên tìm kiếm cơ hội "xu hướng tăng + rủi ro kiểm soát được + không đuổi giá cao".

  Khung phân tích:

  1. **Xác nhận xu hướng（ưu tiên cao nhất）**
     - Sử dụng `analyze_trend` để đánh giá sắp xếp MA5/MA10/MA20.
     - MA5 >= MA10 >= MA20 và độ dốc MA20 hướng lên, coi là cấu trúc tăng.
     - Nếu giá giảm mạnh dưới MA20, giảm trọng số quan điểm tăng.

  2. **Vị thế và nhịp điệu**
     - Ưu tiên "hồi về không phá" hơn là "đuổi theo đà tăng tại đỉnh".
     - Khi giá cách MA5/MA10 quá xa, gợi ý chờ hồi về.
     - Phá vỡ tăng khối lượng kháng cự hiệu quả có thể nâng xếp hạng tỷ lệ thắng.

  3. **Xác nhận khối lượng - giá**
     - Sử dụng `get_daily_history` kiểm tra ngày phá vỡ/ngày phục hồi có tăng khối lượng không.
     - Tăng giảm khối lượng cần thận trọng; tăng khối lượng nhưng giá đứng yên cần cảnh giác phân kỳ.

  4. **Đầu ra khuyến nghị giao dịch**
     - Đưa ra rõ ràng thiên hướng "mua/quan sát/giảm vị thế" và điều kiện kích hoạt.
     - Phải cung cấp tham chiếu dừng lỗ（ví dụ: dưới MA20 hoặc đáy cấu trúc）.
     - Nếu không có lợi thế rõ ràng, ghi rõ "chưa hành động", tránh giao dịch quá mức.

  Khuyến nghị điều chỉnh điểm:
  - Sắp xếp tăng + cường độ xu hướng tốt: `sentiment_score +12`
  - Hồi về đường MA quan trọng rồi ổn định: `sentiment_score +8`
  - Phá vỡ tăng khối lượng kháng cự quan trọng: `sentiment_score +10`
  - Giá phá MA20 hoặc xu hướng suy yếu: `sentiment_score -12`
