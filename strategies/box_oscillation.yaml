instructions: |
  **Dao động trong vùng（Box Range Trading Strategy）**

  Logic cốt lõi: giá bên trong hộp dao động qua lại giữa mức kháng cự và hỗ trợ,
  "mua sát hỗ trợ, bán gần kháng cự", thu lợi nhuận theo sóng trong vùng.

  ## Các bước phân tích

  ### 1. Nhận diện hộp giá
  Sử dụng `get_daily_history` lấy dữ liệu 60~120 ngày gần nhất:

  - **Đỉnh hộp（kháng cự）**: đường nối các đỉnh chạm nhiều lần nhưng không phá vỡ hiệu quả gần đây.
    Thường là vùng tập trung đỉnh xuất hiện 3 lần trở lên trong 20~60 ngày.
  - **Đáy hộp（hỗ trợ）**: đường nối các đáy thăm dò nhiều lần nhưng không giảm hiệu quả gần đây.
  - Tính hợp lệ của hộp: đỉnh và đáy mỗi bên phải chạm ít nhất 2~3 lần mới xác nhận.
  - Sử dụng support_levels / resistance_levels của `analyze_trend` hỗ trợ định vị.

  ### 2. Xác định vị thế hiện tại
  Sử dụng `get_realtime_quote` lấy giá hiện tại, so sánh với biên hộp:

  - **Vùng đáy hộp**（cách hỗ trợ ≤5%）: tín hiệu mua/thêm vị thế, dừng lỗ đặt dưới đáy hộp 3%.
  - **Vùng giữa hộp**（1/3 giữa của hộp）: quan sát, không chủ động giao dịch.
  - **Vùng đỉnh hộp**（cách kháng cự ≤5%）: tín hiệu giảm vị thế/chốt lời, không đuổi theo đà tăng.

  ### 3. Khối lượng hỗ trợ phán đoán
  - **Đáy hộp tăng khối lượng ổn định**: tín hiệu mạnh hỗ trợ hiệu quả, có thể giữ vị thế lớn hơn.
  - **Đỉnh hộp giảm khối lượng đứng giá**: tín hiệu bán kháng cự hiệu quả.
  - **Phá vỡ hộp（khối lượng vượt 2 lần khối lượng trung bình）**:
    - Phá vỡ lên trên hiệu quả → chuyển sang chiến lược xu hướng tăng, mục tiêu mới = mở rộng chiều cao hộp.
    - Giảm xuống dưới hiệu quả → thoát ra chờ đợi, hỗ trợ cũ trở thành kháng cự.

  ### 4. Chiều rộng hộp và lợi nhuận kỳ vọng
  - Tính chiều rộng hộp: (đỉnh - đáy) / đáy × 100%.
  - Chiều rộng < 5%: không gian giao dịch quá hẹp, không nên tham gia.
  - Chiều rộng 5%~15%: hộp tiêu chuẩn, giao dịch theo sóng khả thi.
  - Chiều rộng > 15%: hộp lớn, có thể giao dịch sóng lớn hơn.

  ### 5. Nhận diện phá vỡ giả
  - Trong ngày giá chạm kháng cự/hỗ trợ rồi rút nhanh, đóng cửa trở lại trong hộp → phá vỡ giả, duy trì giao dịch trong hộp.
  - Đóng cửa liên tiếp hai ngày vượt biên hộp, khối lượng tăng → phá vỡ thật, điều chỉnh chiến lược.

  ### 6. Yêu cầu đầu ra
  - Nêu rõ mức giá đỉnh hộp và đáy hộp.
  - Vùng giá hiện tại（đáy hộp/giữa hộp/đỉnh hộp）.
  - Nếu giá đã phá vỡ, nêu hướng phá vỡ và mục tiêu mới.
  - Khuyến nghị vị thế và mức dừng lỗ.

  Khuyến nghị điều chỉnh điểm:
  - Đáy hộp ổn định + giảm khối lượng: `sentiment_score +10`
  - Đáy hộp tăng khối lượng tiến lên đỉnh: `sentiment_score +12`
  - Phá vỡ lên trên hộp hiệu quả: `sentiment_score +15，chuyển chiến lược xu hướng`
  - Đang ở vùng đỉnh hộp: `sentiment_score -5（không đuổi theo đà tăng）`
  - Đáy hộp giảm hiệu quả: `sentiment_score -15，thoát ra`
