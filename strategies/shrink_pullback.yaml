# Shrink Volume Pullback Strategy / 缩量回踩
# Volume shrinks during pullback to MA5/MA10, then price bounces.

name: shrink_pullback
display_name: Hồi về giảm khối lượng
description: Phát hiện tín hiệu hồi về giảm khối lượng tại hỗ trợ đường MA, điểm vào lý tưởng cho xu hướng tiếp diễn.
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [hồi về giảm khối lượng, hồi về]
default_router: true
default_priority: 40
market_regimes: [trending_down, sideways]

instructions: |
  **Hồi về giảm khối lượng（Shrink Volume Pullback Strategy）**

  Tiêu chí xác định điểm vào:

  1. **Điều kiện tiên quyết**（liên quan lý niệm 2: giao dịch xu hướng）:
     - Cổ phiếu phải đang trong xu hướng tăng（MA5 > MA10 > MA20）.
     - Sử dụng `analyze_trend` xác nhận sắp xếp tăng.

  2. **Phát hiện hồi về**（liên quan lý niệm 4: ưu tiên điểm mua）:
     - Sử dụng `get_daily_history` và `get_realtime_quote`.
     - Giá hồi về gần MA5（sai số trong 1%）hoặc gần MA10（sai số trong 2%）.
     - Khối lượng giao dịch trong giai đoạn điều chỉnh < 70% khối lượng trung bình 5 ngày（đặc trưng giảm khối lượng）.
     - `analyze_trend` → volume_status nên hiển thị giảm khối lượng.

  3. **Tín hiệu phục hồi**（liên quan lý niệm 1: chiến lược vào lệnh chặt chẽ）:
     - Giá hiện tại giữ được mức hỗ trợ đường MA.
     - Độ lệch MA5 < 2% — vùng mua tốt nhất.

  4. **Điều kiện xác nhận**（liên quan lý niệm 5: kiểm tra rủi ro）:
     - `search_stock_news` không có tin xấu.
     - Cấu trúc chip lành mạnh（tỷ lệ có lãi 50-80%）.

  Điều chỉnh điểm:
  - Hồi về giảm khối lượng MA5: sentiment_score +10
  - Hồi về giảm khối lượng MA10 và khối lượng < 0.6 lần khối lượng trung bình: sentiment_score +8
  - Điểm mua lý tưởng đặt tại mức MA5, điểm mua thứ cấp tại MA10.
  - Dừng lỗ đặt tại mức MA20.
  - Ghi chú "hồi về giảm khối lượng" trong `buy_reason`.
