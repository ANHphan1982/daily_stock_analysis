# Chan Theory Strategy / 缠论
# Based on Zen channel theory: pen, stroke, segment, hub structure analysis.

name: chan_theory
display_name: Lý thuyết Chan
description: Dựa trên bút, đoạn, trung khu trong lý thuyết Chan, xác định cấp độ xu hướng, điểm mua bán và tín hiệu phân kỳ.
