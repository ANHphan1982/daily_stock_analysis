instructions: |
  **Lý thuyết Chan（Chan Theory / Zen Channel Theory）**

  Khung cốt lõi: phân hình → bút → đoạn → trung khu → xu hướng

  ## Các bước phân tích

  ### 1. Xác định cấu trúc giá（nhận diện trung khu）
  - Sử dụng `get_daily_history` lấy dữ liệu khung ngày 60 ngày gần nhất.
  - Nhận diện chuỗi đỉnh-đáy giá gần đây, xác định hiện tại đang ở
    **trung khu dao động**（từ 1 trung khu trở lên）hay **đoạn xu hướng**（rời trung khu lên/xuống）.
  - Trung khu: vùng chồng chéo của 3 đoạn đi liên tiếp, giá dao động qua lại trong vùng này.
  - Xu hướng: 3 trung khu cùng cấp liên tiếp di chuyển cùng một hướng.

  ### 2. Xác định phân kỳ（tín hiệu ưu tiên cao nhất）
  - **Phân kỳ đỉnh**: giá tạo đỉnh mới nhưng diện tích cột đỏ MACD thu hẹp → tín hiệu bán/giảm vị thế.
  - **Phân kỳ đáy**: giá tạo đáy mới nhưng diện tích cột xanh MACD thu hẹp → tín hiệu mua/thêm vị thế.
  - Sử dụng `analyze_trend` lấy dữ liệu MACD, so sánh với đỉnh-đáy giá.

  ### 3. Xác định điểm mua bán
  - **Điểm mua 1**（mạnh nhất）: trong xu hướng giảm, trung khu cuối cùng xuất hiện phân kỳ đáy.
  - **Điểm mua 2**: sau khi rời trung khu giảm, lần điều chỉnh đầu tiên không phá đỉnh trung khu.
  - **Điểm mua 3**: sau dao động trung khu phá vỡ lên（không quay lại trong trung khu）.
  - **Điểm bán 1/2/3**: cấu trúc đối xứng, hướng ngược lại.
  - Cấp độ điểm mua bán của giá hiện tại quyết định quy mô vị thế.

  ### 4. Cấp độ và vị thế
  - Điểm mua bán cấp ngày có thể dùng vị thế tương đối lớn（30-50%）.
  - Điểm mua bán cấp tuần có thể dùng vị thế lớn（50-80%）.
  - Khi nhiều cấp độ cộng hưởng（ngày + tuần cùng hướng）tín hiệu mạnh nhất.

  ### 5. Yêu cầu đầu ra
  - Nêu rõ hiện tại đang ở: xu hướng tăng/xu hướng giảm/trung khu dao động.
  - Chỉ ra có tín hiệu phân kỳ và cấp độ phân kỳ không.
  - Đưa ra loại điểm mua bán hiện tại（điểm mua 1/2/3 v.v.）, nếu không có thì ghi "hiện chưa có điểm mua bán rõ ràng".
  - Dừng lỗ đặt tại đáy trước（khi mua）hoặc đỉnh trước（khi bán）.

  Khuyến nghị điều chỉnh điểm:
  - Phân kỳ đáy + tín hiệu điểm mua 1: `sentiment_score +15`
  - Điểm mua 2/3 cộng hưởng: `sentiment_score +10`
  - Trung khu dao động không có hướng rõ ràng: `sentiment_score duy trì cơ sở`
  - Phân kỳ đỉnh / xu hướng giảm: `sentiment_score -15`
